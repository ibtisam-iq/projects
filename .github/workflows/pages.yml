name: CI/CD — projects.ibtisam-iq.com

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys — cancel in-progress if new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

# Minimal default permissions — elevated per-job only
permissions:
  contents: read

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install yaml package for generator
        run: npm install yaml --no-save

      - name: Generate projects.ts from YAML
        run: node scripts/generate-projects.js

      - name: Build
        run: npm run build

      - name: Add CNAME
        run: echo "projects.ibtisam-iq.com" > dist/CNAME

      - name: Add 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy (only runs after build succeeds)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    # Required permissions for official OIDC-based Pages deploy
    permissions:
      pages: write
      id-token: write

    # Ties deployment to the github-pages environment (shows URL in UI)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        if: ${{ env.ACT != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

# One prerequisite: In repo → Settings → Pages → Source, set it to "GitHub Actions" (not "Deploy from a branch").
# This is required for actions/deploy-pages to work.
