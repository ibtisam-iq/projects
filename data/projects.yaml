- slug: microservices-demo
  title: "Polyglot Microservices: End-to-End GitOps on Amazon EKS"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Deployed a 10-service polyglot microservices architecture on Amazon EKS using full GitOps principles. Implemented automated continuous delivery, centralized observability, and elastic autoscaling."
  description: "Transformed Google's Online Boutique into a production-grade, fully automated GitOps ecosystem. Architected GitHub Actions CI pipelines with intelligent monorepo change detection and strict Trivy security scanning, publishing OCI artifacts directly to GHCR. Provisioned an Amazon EKS cluster via Terraform and orchestrated the 10 microservices via ArgoCD for seamless, continuous delivery. The highly-available platform features a unified Gateway API (ALB) routing 5 subdomains, zero-touch ExternalDNS records, elastic Horizontal Pod Autoscaling (HPA), and a comprehensive observability suite integrating the kube-prometheus-stack and ELK stack for deep cluster visibility."
  sections:
    - title: "Key Achievements"
      items:
        - "Orchestrated the continuous delivery of a complex 10-service polyglot architecture to Amazon EKS using ArgoCD and GitOps methodologies."
        - "Engineered intelligent GitHub Actions CI pipelines featuring monorepo matrix dispatch, significantly optimizing build times by only testing modified microservices."
        - "Designed a highly-efficient AWS networking topology, utilizing the modern Gateway API to route 5 distinct subdomains through a single, cost-optimized Application Load Balancer."
        - "Implemented a comprehensive, centralized observability stack featuring Prometheus, Grafana with Slack alerting, and an ELK stack for deep, cluster-wide log aggregation."
        - "Maintained an extensive 6-phase engineering runbook detailing 24 key architectural decisions, demonstrating a profound understanding of distributed systems."
    - title: "Key Decisions"
      items:
        - "Selected the modern Kubernetes Gateway API over traditional Ingress controllers, aligning the architecture with the future-proof networking standards recommended by the CNCF."
        - "Decoupled application deployment from platform observability: ArgoCD manages the microservices, ensuring that Prometheus and Grafana remain fully operational even if GitOps controllers fail."
        - "Optimized upstream Helm chart integration by maintaining strict 'patch-only' values, modifying only 5 specific fields to ensure seamless future upstream upgrades."
        - "Architected a zero-trust CI/CD boundary: GitHub Actions CI has zero direct access to the EKS cluster, completely offloading deployment execution to the internal ArgoCD Image Updater."
