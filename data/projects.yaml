- slug: polyglot-monolith-deployment
  title: "Legacy Modernization: Containerizing Polyglot Monoliths to EKS"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Led the infrastructure modernization of three legacy monolithic applications. Standardized their containerization and orchestrated their deployment from local development environments to production AWS EKS."
  description: "Executed a comprehensive infrastructure modernization initiative across three independent legacy monolithic codebases (Java, Python, Node.js). Directed the entire modernization lifecycle: auditing legacy code, abstracting hardcoded configurations to 12-factor environments, and engineering highly-optimized, non-root, multi-stage Docker containers. Engineered a highly-reusable, platform-agnostic deployment architecture using Kustomize overlays. The standardized artifacts were successfully orchestrated across diverse environments, from self-provisioned Bare-Metal Kubernetes clusters (automated via bespoke, version-aware kubeadm scripts) to production-grade Amazon EKS deployments. This initiative dramatically improved application portability, security, and developer velocity across the organization."
  sections:
    - title: "Key Achievements"
      items:
        - "Modernized and containerized three production-grade monolithic applications, transforming legacy codebases into portable, cloud-native, and highly secure Docker artifacts."
        - "Engineered a robust, idempotent 'kubeadm' automation tool to provision Bare-Metal clusters from scratch, featuring dynamic Kubernetes API version-pinning and safe-reset logic."
        - "Designed a DRY (Don't Repeat Yourself) Kustomize architecture, ensuring that Bare-Metal and EKS deployments share over 80% of their YAML definitions with zero duplication."
        - "Successfully debugged critical cross-platform production issues, including AWS ALB health check failures, HTTPS redirect loops, and Bare-Metal Nginx filesystem permission blocks."
        - "Architected a true GitOps separation of concerns, strictly segregating application code repositories from platform infrastructure repositories via seamless image tag handoffs."
