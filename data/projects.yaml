- slug: devsecops-pipeline-engineering
  title: "Standardized DevSecOps Pipelines Across Java, Python, and Node.js Monoliths using Jenkins and GitHub Actions"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Designed a universal 14-stage DevSecOps pipeline architecture. Mirrored the exact implementation across Jenkins and GitHub Actions to demonstrate CI/CD portability."
  description: "Architected a strict, language-agnostic DevSecOps platform across three monolithic codebases (Java, Python, Node.js). To prove that rigorous DevSecOps discipline is a process rather than a tool dependency, I designed a single, immutable 14-stage build-test-scan-publish pipeline and implemented it identically across both Jenkins and GitHub Actions. The pipelines enforce security compliance, utilizing multi-pass Trivy scanning (explicitly isolating --vuln-type library from OS packages) to hard-fail deployments upon detecting CRITICAL CVEs."
  sections:
    - title: "Key Achievements"
      items:
        - "Standardized CI/CD by designing a universal 14-stage pipeline and implementing it across both Jenkins and GitHub Actions to prove infrastructure portability."
        - "Configured multi-pass Trivy scanning, explicitly isolating --vuln-type library from OS packages to ensure unpatched base-image CVEs do not falsely block application releases."
        - "Eradicated inline shell script sprawl by forcing all Jest and Pytest configurations into strict, version-controlled configuration files."
        - "Automated multi-registry artifact publishing, pushing version-tagged Docker images simultaneously to GHCR, Docker Hub, and a self-hosted Nexus registry."
    - title: "Key Decisions"
      items:
        - "Mirrored CI logic across Jenkins and GitHub Actions intentionally to demonstrate that DevSecOps is independent of the underlying CI tooling."
        - "Mandated hard-fail security and quality gates over passive warnings, enforcing a culture where security scans actively protect production."
        - "Architected a strict CI/CD decoupling strategy: pipelines communicate with deployment repositories solely via a single image tag handoff."
