- slug: retail-store-sample-app
  title: "Multi-Environment Orchestration: Deploying Polyglot Microservices from Bare-Metal to Amazon EKS featuring Helmfile for declarative DAG orchestration; ALB Ingress Controller for shared routing; EBS CSI Driver with gp3 for persistent storage; DynamoDB for NoSQL state; AWS SQS, SNS, & Lambda for event-driven messaging pipelines; and Fluent Bit with CloudWatch Container Insights for native observability"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Engineered platform-agnostic values overrides to deploy an AWS e-commerce demo app across bare-metal and Amazon EKS environments, orchestrating the entire lifecycle via Helmfile."
  description: "Began by decoupling the AWS microservices demo from its native cloud dependencies, utilizing custom values-*.yaml overrides to prove application portability on a local bare-metal kubeadm cluster (via SilverStack). To automate the deployment, I authored a unified Helmfile orchestration layer. Finally, I returned the application to Amazon EKS within a restricted KodeKloud sandbox, provisioning the control plane and self-managed worker nodes via CloudFormation to work within strict Service Control Policies (SCPs), while offloading state to DynamoDB, SQS, Lambda, and SNS via IRSA."
  sections:
    - title: "Bare-Metal Portability & Decoupling"
      items:
        - "Chart Decoupling: Maintained the pristine state of the 5 upstream microservice charts published by AWS. Engineered decoupled, environment-specific values-*.yaml override files to modify application behavior dynamically at runtime."
        - "Severing Cloud Dependencies: Ripped out AWS DynamoDB, SQS, ElastiCache, and ALB Ingress to deploy the stack onto a bare-metal kubeadm cluster using local containerized alternatives (RabbitMQ, Redis, NodePort), proving platform portability."
    - title: "Deployment Orchestration"
      items:
        - "Helmfile Engineering: Authored a declarative Helmfile orchestration layer to consolidate the execution of 5 separate helm deployments."
        - "Dependency Sequencing: Authored 3 target-specific Helmfile configurations, utilizing the 'needs:' directive to ensure databases and message brokers provisioned strictly before microservices across all environments."
    - title: "Amazon EKS Infrastructure Engineering"
      items:
        - "Bypassing SCP Restrictions: Provisioned IAM roles via Terraform, deployed the control plane via eksctl, and engineered self-managed worker nodes via custom AWS CloudFormation templates to bypass IAM blocks on managed node groups."
        - "AWS Managed Services Integration: Offloaded application state back to AWS native services. Configured IAM Roles for Service Accounts (IRSA) to bind the Cart service to DynamoDB and the Orders service to a serverless event pipeline (SQS -> Lambda -> SNS)."
        - "Ingress Optimization: Deployed the AWS Load Balancer Controller and configured an Ingress Group to share a single ALB across the UI, Prometheus, and Grafana."
