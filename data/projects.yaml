- slug: aws-secure-static-hosting
  title: "Secure Static Hosting & Global Distribution on AWS featuring S3 with KMS Bucket Keys for encrypted origins; IAM for Cross-Region Replication; CloudFront with OAC & ACM for secure global delivery; CloudTrail for API auditing; and S3 Server Access Logs for HTTP observability"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Engineered a zero-trust, globally distributed static hosting architecture on AWS. Configured Cross-Region Replication (CRR) with dual-region KMS encryption and enforced strict origin access via CloudFront OAC."
  description: "Architected a highly secure, disaster-resilient static hosting platform on AWS, entirely avoiding compute resources like EC2 or ECS. The production architecture serves content globally through Amazon CloudFront, utilizing Origin Access Control (OAC) with SigV4 signing to enforce a strict boundary to a fully private S3 origin. To guarantee disaster recovery, the architecture features automated Cross-Region Replication (us-east-1 to us-west-2), syncing objects decrypted and re-encrypted across independent regional KMS Customer Managed Keys (CMKs). Comprehensive audit and telemetry pipelines were established using AWS CloudTrail and S3 Server Access Logs."
  sections:
    - title: "Secure Storage & Disaster Recovery"
      items:
        - "Zero-Trust S3 Origins: Engineered dual-region S3 buckets (us-east-1 and us-west-2) locked down entirely from public access via account-level blocks."
        - "Cross-Region Replication (CRR): Configured CRR and explicitly engineered dual-region KMS Customer Managed Keys (CMKs) alongside strict IAM roles to ensure replicated data is decrypted at the source and re-encrypted at the destination."
        - "KMS Cost Optimization: Optimized cloud expenditure by enabling S3 Bucket Keys across all regions, effectively reducing high-volume KMS GenerateDataKey API costs by up to 99%."
    - title: "Global Delivery & CDN Security"
      items:
        - "Global Content Delivery: Deployed a global Amazon CloudFront distribution to serve the static content over a custom domain secured by an ACM wildcard certificate."
        - "Origin Access Control (OAC): Adopted modern Origin Access Control (OAC) with SigV4 request signing over legacy OAI, establishing a strict, authenticated security boundary to the private S3 origin."
        - "SPA Error Handling: Diagnosed and mitigated complex 403 Access Denied errors by configuring CloudFront's Custom Error Responses to gracefully handle client-side Single Page Application (SPA) routing."
    - title: "Observability & Lifecycle Management"
      items:
        - "Multi-Service Auditing: Wired complete API audit logging by configuring CloudTrail to track both management and data events across the primary and replica buckets."
        - "HTTP Telemetry: Enabled S3 Server Access Logs to capture raw, per-request HTTP telemetry, carefully provisioning target bucket IAM policies to authorize the logging service principal."
        - "Storage Lifecycle: Implemented an S3 Lifecycle Policy to automatically transition non-current object versions (stale deployments) to Glacier after 30 days, minimizing long-term storage costs."
  tags:
    - networking
    - security
    - observability
    - documentation
  tech:
