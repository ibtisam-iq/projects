- slug: polyglot-monolith-deployment
  title: "Polyglot Platform Orchestration featuring Kustomize for DRY GitOps deployments; Kubernetes for bare-metal & EKS container orchestration; Amazon ECS for serverless compute; and EC2 Auto Scaling for virtual machine resilience"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Modernized three legacy monoliths (Java, Python, Node) into strictly containerized artifacts. Deployed across EC2 ASGs, ECS Fargate, Bare-Metal Kubernetes, and Amazon EKS."
  description: "Engineered deployment orchestration pipelines for three monolithic codebases (Java, Python, Node.js). Before deploying to the cloud, I audited the codebases (upgrading frameworks, injecting container health probes) and standardized database connectivity across local, Docker Compose, and bare-metal environments. I then refactored the legacy applications into highly optimized Docker images and orchestrated these artifacts across four compute paradigms: EC2 Auto Scaling Groups, Amazon ECS Fargate, Bare-Metal Kubernetes, and Amazon EKS."
  sections:
    - title: "Codebase Auditing & Database Mechanics"
      items:
        - "Code Modernization: Audited and upgraded three legacy codebases (Spring Boot 3.4.5, Java 21, Node.js 22, Python 3.12). Injected native container readiness probes ('/health', '/actuator/health') directly into the application logic to satisfy Kubernetes deployment requirements."
        - "Database Connectivity Mechanics: Transitioned database resolution from native bare-metal connections ('localhost'), to Docker Compose internal DNS ('mysql' / 'postgres'), and finally to decoupled cloud endpoints (Amazon RDS) without altering source code."
        - "Environment Troubleshooting: Engineered configuration pipelines, solving edge cases such as 'python-dotenv' URL truncation, PostgreSQL 15+ schema-level grants, and quoting Java JDBC URLs to prevent shell corruption."
    - title: "Architectural Refactoring & Containerization"
      items:
        - "2-Tier to 3-Tier Migration: Refactored the legacy Node.js application from a flat 2-tier model (Express serving UI) into a strict 3-tier MVC architecture, deploying an Nginx reverse proxy to serve the compiled React frontend and proxy API requests to the backend."
        - "Multi-Stage Docker Architecture: Engineered advanced multi-stage Dockerfiles across all stacks. For the Node frontend, I built the React app via Webpack in a Node container and copied the static payload directly into an alpine Nginx runtime, excluding the Node toolchain from the final image entirely."
    - title: "Compute Paradigm Versatility"
      items:
        - "Multi-Platform Deployments: Engineered scalable deployments across four distinct compute abstractions: bare-metal virtual machines (EC2), serverless containers (ECS Fargate), and full orchestration (Kubernetes)."
        - "Pragmatic Architecture: Avoided forced microservice paradigms, correctly deploying a 2-tier Python Flask application as a single cohesive unit utilizing Gunicorn, demonstrating judgment in applying the right architectural pattern."
    - title: "Kubernetes & GitOps Engineering"
      items:
        - "DRY Overlay Architecture: Designed a DRY (Don't Repeat Yourself) Kustomize architecture, ensuring that Bare-Metal and Amazon EKS deployments share over 80% of their base YAML definitions."
        - "Dynamic State Injection: Architected Kustomize bases strictly for stateless Deployments, dynamically injecting StatefulSets, StorageClasses, and AWS RDS connection strings exclusively via environment-specific overlays."
