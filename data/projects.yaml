- slug: java-monolith
  title: "Evolutionary Architecture: Java Monolith from EC2 to EKS"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Demonstrated advanced platform engineering by evolving a legacy Java application through 4 distinct cloud paradigms: from basic EC2 Auto Scaling to serverless ECS, culminating in full Kubernetes orchestration."
  description: "Architected a massive vertical deep-dive into the infrastructure evolution of a single enterprise application. The 8-phase project documents the complete journey of a legacy Spring Boot 3.4 monolith from local bare-metal execution to production cloud orchestration. After optimizing the Docker artifact footprint by over 65% and engineering 14-stage DevSecOps pipelines, the identical immutable artifact was systematically deployed across four increasingly scalable infrastructure paradigms: AWS EC2 Auto Scaling groups (via Launch Templates and IAM Profiles), serverless Amazon ECS Fargate tasks, local Bare-Metal Kubernetes, and Amazon EKS. The final Kubernetes orchestration leverages a highly modular Kustomize architecture, decoupling infrastructure state to Amazon RDS and routing via the modern Gateway API."
  sections:
    - title: "Key Achievements"
      items:
        - "Showcased profound architectural adaptability by successfully orchestrating the exact same immutable Docker artifact across 4 distinct paradigms: EC2, ECS, Bare-Metal K8s, and EKS."
        - "Optimized legacy monolithic application performance, slashing the container footprint from >500MB to ~165MB and tuning JVM limits for flawless cloud execution."
        - "Engineered identical, high-security 14-stage declarative CI/CD pipelines across multiple platforms, incorporating 3-pass Trivy scanning and SonarQube quality gates."
        - "Authored an exhaustive 8-phase engineering runbook detailing precise architectural decisions, transitioning the application from local 12-factor testing to dynamic edge TLS termination."
    - title: "Key Decisions"
      items:
        - "Adopted a highly mature 'build once, reuse everywhere' cloud methodology, seamlessly reusing Route 53 Hosted Zones and ACM certificates across the EC2, ECS, and EKS phases."
        - "Strategically omitted 'storageClassName' from base Kubernetes manifests, dynamically injecting AWS EBS 'gp3' via EKS overlays to prevent breaking local developer environments."
        - "Exclusively deployed Horizontal Pod Autoscalers (HPA) in the EKS overlay, intelligently avoiding local deployment failures caused by the absence of a Bare-Metal Metrics Server."
        - "Successfully mitigated complex cloud networking edge-cases, permanently resolving infinite AWS ALB HTTPS redirect loops by mastering Spring Boot native forward headers."
        - "Future-proofed the cluster's ingress architecture by abandoning traditional Ingress in favor of the modern Kubernetes Gateway API (AWS Load Balancer Controller and Nginx)."
