- slug: aws-secure-static-hosting
  title: "High-Availability Cloud Architecture: Secure AWS Static Hosting"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Designed a production-grade, disaster-resilient cloud hosting architecture. Implemented cross-region replication, military-grade KMS encryption, and zero-trust CDN access to ensure 99.99% availability."
  description: "Architected a highly secure, enterprise-grade static hosting platform on AWS, completely eliminating the vulnerabilities of public S3 website hosting. The production architecture serves content globally through Amazon CloudFront, utilizing modern Origin Access Control (OAC) with SigV4 signing to enforce a zero-trust boundary to a fully private S3 origin. To guarantee disaster recovery and business continuity, the architecture features automated Cross-Region Replication (us-east-1 to us-west-2), seamlessly syncing objects re-encrypted with independent regional KMS keys. The platform is extensively monitored via multi-region CloudTrail data-event auditing, S3 server access logs, and cost-optimized Glacier lifecycle policies, delivering a highly-available, militarily secure, and globally performant delivery network."
  sections:
    - title: "Key Achievements"
      items:
        - "Architected a zero-trust AWS delivery network, completely replacing vulnerable public S3 endpoints with highly-secure CloudFront distributions authenticated via Origin Access Control."
        - "Engineered a robust Disaster Recovery (DR) posture via Cross-Region Replication, ensuring business continuity by syncing and re-encrypting data across independent regional KMS keys."
        - "Optimized cloud expenditure at the design phase by enabling S3 Bucket Keys across all regions, effectively reducing high-volume KMS GenerateDataKey costs by up to 99%."
        - "Established comprehensive enterprise observability, wiring multi-region CloudTrail auditing, S3 server access logging, and automated Glacier archival lifecycle policies."
        - "Engineered a precise 9-step reverse-dependency teardown script to flawlessly decommission the complex, billable infrastructure stack across multiple AWS regions."
    - title: "Key Decisions"
      items:
        - "Selected modern CloudFront Origin Access Control (OAC) over legacy OAI, leveraging superior SigV4 request signing to align with strict AWS security best practices."
        - "Mastered complex Cross-Region Replication mechanics for KMS-encrypted objects, precisely configuring SourceSelectionCriteria and dual-region IAM kms:Decrypt/Encrypt permissions."
        - "Systematically diagnosed and resolved highly obscure 403 Access Denied errors, distinguishing between missing DefaultRootObjects, stale bucket policies, and intended public blocks."
        - "Identified and circumvented critical Cloudflare proxy-mode traps that silently break ACM DNS validation, preventing costly diagnostic delays during TLS certificate provisioning."
        - "Treated the project with absolute financial discipline, designing complete programmatic teardown paths for all billable resources rather than abandoning infrastructure in personal accounts."
