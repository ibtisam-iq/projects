- slug: microservices-demo
  title: "Event-Driven GitOps: Deploying Polyglot Microservices on Amazon EKS featuring Terraform for infrastructure provisioning; GitHub Actions for matrix CI pipelines; Helm & Kustomize for GitOps overlays; Kubernetes Gateway API for traffic routing; ExternalDNS for automated Route 53; ArgoCD & Image Updater for zero-touch continuous delivery; kube-prometheus-stack for alerting; and the Elastic Stack for logging"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Deployed a 10-service polyglot application on Amazon EKS using an event-driven GitOps pipeline. Configured zero-touch continuous delivery via ArgoCD Image Updater, Gateway API routing, and centralized observability."
  description: "Automated the deployment of Google's Online Boutique into a production-grade, event-driven GitOps ecosystem with zero manual intervention required for deployments. Provisioned the underlying infrastructure using Terraform. Engineered 3 CI pipelines for change detection, Trivy security scanning, and automated Helm chart releases to GHCR. Configured ArgoCD for declarative GitOps deployments, utilizing Kustomize to combine raw Gateway API manifests alongside the packaged Helm chart. The platform utilizes the Kubernetes Gateway API for advanced traffic routing, ExternalDNS for automated Route 53 record provisioning, and ArgoCD Image Updater for zero-touch continuous delivery. Comprehensive observability is achieved via kube-prometheus-stack for monitoring, AlertManager and Slack for notifications, and the Elastic Stack for centralized logging."
  sections:
    - title: "AWS Cloud & Platform Engineering"
      items:
        - "Infrastructure Provisioning: Engineered the complete AWS environment (VPCs, Bastion hosts, EKS cluster) using modular Terraform to guarantee immutable infrastructure."
        - "Bypassing SCP Restrictions: Engineered self-managed AWS Auto Scaling Groups (ASGs) to bypass strict lab Service Control Policies (SCPs) that blocked EKS managed node groups."
        - "Storage Optimization: Configured the AWS EBS CSI driver to enforce 'gp3' as the default StorageClass. This reduced infrastructure costs while fulfilling high-I/O requirements for Elasticsearch PVCs."
        - "Certificate Automation: Provisioned an ACM wildcard certificate (*.ibtisam.qzz.io) and attached it to the shared Application Load Balancer to secure all custom subdomains."
    - title: "Kubernetes & Traffic Management"
      items:
        - "Gateway API Implementation: Adopted the modern Kubernetes Gateway API over the legacy Ingress API. Integrated the AWS Load Balancer Controller to share a single ALB across 5 independent HTTPRoutes."
        - "Automated Route 53 DNS: Eliminated manual DNS management. Integrated ExternalDNS to automatically create and reconcile AWS Route 53 records directly from Gateway API manifests."
        - "Dynamic Workload Scaling: Deployed the Kubernetes Metrics Server and configured Horizontal Pod Autoscalers (HPA) to dynamically scale frontend pods based on real-time CPU utilization."
        - "Immutable Helm Overlays: Kept the upstream Google Online Boutique Helm chart completely pristine. Utilized Kustomize to inject custom Gateway API manifests directly within ArgoCD."
    - title: "GitOps & Zero-Touch Delivery"
      items:
        - "Zero-Touch Continuous Delivery: Architected a fully autonomous workflow. GitHub Actions CI pipelines push OCI artifacts to GHCR, and ArgoCD Image Updater automatically handles the EKS cluster rollout."
        - "Image Digest Reconciliation: Overcame BuildKit epoch timestamp constraints by configuring Image Updater to trigger deployments based strictly on image SHA-256 digests."
        - "Clean Git History: Configured Image Updater to use the 'argocd' write method. This patches image overrides directly in-memory and prevents the CD repository from being flooded with automated commits."
    - title: "Security & Zero-Trust CI/CD"
      items:
        - "Monorepo Matrix CI: Engineered 3 advanced GitHub Actions pipelines using dynamic matrix dispatch. This reduced build times by exclusively compiling and testing modified microservices."
        - "Two-Repo Separation: Enforced a strict isolation boundary. The CI repository has zero access to the EKS cluster and relies entirely on pull-based GitOps for deployment execution."
        - "Fine-Grained Token Scoping: Restricted CI deployment tokens to explicit 'Contents: Read+Write' permissions exclusively on the CD repository to prevent lateral movement."
        - "DevSecOps Integration: Embedded Trivy filesystem and container image scanning into the CI pipelines to block vulnerabilities before artifacts reach the registry."
    - title: "Centralized Observability"
      items:
        - "Decoupled Observability: Deployed the observability tools independently of the core application. If ArgoCD or the CI pipeline fails, the monitoring infrastructure remains fully operational to debug the outage."
        - "Proactive Monitoring: Deployed the kube-prometheus-stack for metrics aggregation. Configured AlertManager to push critical cluster scaling events and alerts directly to Slack."
        - "Centralized Logging: Implemented an Elastic Stack (Elasticsearch, Filebeat, Kibana) to aggregate application and system logs across the 4-node EKS cluster."
