- slug: silverstack-cicd-platform
  title: "Self-Hosted CI/CD Stack (Jenkins, SonarQube, Nexus) on Custom Domains via Cloudflare Tunnels"
  category: platform
  status: maintained
  year: 2026
  shortDescription: "Operated a self-hosted CI/CD platform on custom domains. Engineered Cloudflare Tunnels to bypass strict NAT limitations, delivering secure access with zero inbound open ports."
  description: "Built and managed a production-grade CI/CD stack (Jenkins, SonarQube, Nexus) hosted on custom domains. Addressed strict infrastructure limitations (no public IPs, shared NAT) by configuring Cloudflare Tunnels for secure NAT traversal. Deployed cloudflared as a hardened systemd service, routing traffic through an internal Nginx reverse proxy to decouple edge authentication from backend service ports. Configured a layered architecture using 5 custom-built, hardened Linux VM images provisioned via iximiuz labs microVMs. This self-reliant platform establishes complete control over the artifact lifecycle."
  sections:
    - title: "Key Achievements"
      items:
        - "Deployed an end-to-end Enterprise CI/CD platform on custom domains, abstracting underlying NAT limitations via zero-trust Cloudflare Tunnels."
        - "Engineered an Nginx reverse proxy to terminate internal routing from the Cloudflare daemon, decoupling edge access from backend service ports."
        - "Built 5 hardened Linux VM images via automated GitHub Actions pipelines, provisioning them via iximiuz labs microVMs."
        - "Enforced DevSecOps hygiene by hardening service images with restricted daemon permissions and automated build-time health checks."
        - "Published the stack as a community playground on iximiuz Labs, demonstrating infrastructure automation in isolated environments."
    - title: "Key Decisions"
      items:
        - "Decoupled failure domains by provisioning one isolated Cloudflare Tunnel per service, guaranteeing that a failure in the SonarQube tunnel does not disrupt Jenkins."
        - "Separated immutable infrastructure from mutable state, baking binaries into images while dynamically injecting secrets at runtime."
        - "Optimized image update cycles by loading pipeline tooling dynamically via PATH scripts, allowing instantaneous security patching without full image rebuilds."
