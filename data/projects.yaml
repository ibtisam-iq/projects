- slug: debugbox
  title: "DebugBox: Size-Optimized Kubernetes Diagnostics Toolkit featuring Multi-Arch Docker Builds; GitHub Actions for atomic releases; Trivy for vulnerability gating; and MkDocs for automated documentation"
  category: tool
  status: maintained
  year: 2026
  shortDescription: "Architected a comprehensive open-source Kubernetes diagnostic toolkit. Engineered 3 size-optimized variants (saving up to 93% bandwidth) and fully automated the DevSecOps lifecycle from local Makefile linting to multi-registry publishing."
  description: "Standard Kubernetes troubleshooting tools like 'netshoot' are monolithic, pulling hundreds of megabytes for simple connectivity checks. To solve this inefficiency, I architected DebugBox—an open-source toolkit offering 3 right-sized container variants (from a 14MB Lite version for basic DNS checks up to a 104MB Power version for packet forensics). This project demonstrates the ability to engineer an entire open-source software lifecycle. Beyond the containers, I built a modular architecture separating declarative build definitions from procedural installation logic, automated multi-architecture compilation (amd64/arm64) using Docker Buildx and QEMU, integrated hard-fail security scans, and established an automated MkDocs documentation site."
  sections:
    - title: "Architectural Engineering & FinOps"
      items:
        - "Right-Sizing Workloads: Architected 3 purpose-built variants (Lite, Balanced, Power) based on Alpine Linux. Optimized incident response times on bandwidth-constrained edge clusters by reducing diagnostic image sizes by up to 93% compared to industry defaults."
        - "Declarative vs Procedural Isolation: Kept Dockerfiles strictly declarative by offloading procedural package installation and validation logic to dedicated '.packages' and '.verify' scripts."
        - "Cryptographic Binary Verification: Engineered dedicated installer scripts (e.g., install-yq-binary) that handle dynamic architecture detection and enforce strict SHA256 checksum validation for binaries not available in the Alpine package manager."
        - "Operational Determinism: Eliminated unpredictable behavior by strictly pinning all tool versions and base images, ensuring repeatable and deterministic container builds."
    - title: "Kubernetes Developer Experience"
      items:
        - "Context Switching Automation: Injected custom .bashrc profiles pre-loaded with kubectx and kubens aliases, transforming multi-step context switching into single-command executions during cluster incident response."
        - "Pre-Loaded Shell Helpers: Embedded custom bash functions (e.g., json(), yaml(), sniff-dns(), cert-check()) directly into the container filesystem to accelerate data parsing and packet analysis without external scripts."
    - title: "CI/CD & Release Automation"
      items:
        - "Multi-Arch Release Pipelines: Automated a multi-stage GitHub Actions pipeline that utilizes Docker Buildx and QEMU to compile cross-platform images (amd64 and arm64)."
        - "OCI Metadata Injection: Configured the pipeline to dynamically inject standard Open Container Initiative (org.opencontainers.image.*) labels into every image."
        - "Atomic Multi-Registry Publishing: Configured the release pipelines to publish synchronized artifacts simultaneously to GitHub Container Registry (GHCR) and Docker Hub."
        - "Immutable Versioning: Implemented a strict 20-tag semantic versioning strategy upon release triggers (v*.*.*), providing response teams with auditable artifacts and eliminating the risk of floating 'latest' tags."
    - title: "Quality Assurance & DevSecOps"
      items:
        - "Hard-Fail Security Gating: Integrated Trivy to scan images mid-pipeline, explicitly blocking the multi-registry push if HIGH or CRITICAL vulnerabilities are detected."
        - "Container Smoke Testing: Authored custom bash smoke tests (tests/smoke.sh and tests/ci-smoke.sh) that execute inside the built containers during the CI phase to guarantee tool availability before release. These tests dynamically source shared validation logic from an external 'infra-bootstrap' repository."
        - "Local DevSecOps Automation: Authored a comprehensive Makefile orchestrating Hadolint for Dockerfile linting, local Docker builds, shell testing, and Trivy scanning, enabling strict local validation before Git commits."
    - title: "Open-Source Ecosystem Management"
      items:
        - "Automated Documentation: Engineered a responsive documentation site utilizing MkDocs and GitHub Pages, triggered via a dedicated workflow (docs.yml) to ensure usage guides remain synchronized."
