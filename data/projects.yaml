- slug: retail-store-sample-app
  title: "Multi-Environment Orchestration: Deploying Polyglot Microservices from Bare-Metal to Amazon EKS featuring Helmfile for declarative DAG orchestration; ALB Ingress Controller for shared routing; EBS CSI Driver with gp3 for persistent storage; DynamoDB for NoSQL state; AWS SQS, SNS, & Lambda for event-driven messaging pipelines; and Fluent Bit with CloudWatch Container Insights for native observability"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Engineered platform-agnostic values overrides to deploy an AWS e-commerce demo app across bare-metal and Amazon EKS environments, orchestrating the entire lifecycle via Helmfile."
  description: "Began by decoupling the AWS microservices demo from its native cloud dependencies, utilizing custom values-*.yaml overrides to prove application portability on a local bare-metal kubeadm cluster (via SilverStack). To eliminate manual deployment toil, I engineered a unified Helmfile orchestration layer. Finally, I returned the application to Amazon EKS within a restricted KodeKloud sandbox, manually engineering around strict Service Control Policies (SCPs) to provision the control plane and self-managed worker nodes, while offloading state to DynamoDB, SQS, Lambda, and SNS via IRSA."
  sections:
    - title: "Bare-Metal Portability & Decoupling"
      items:
        - "Chart Decoupling: Maintained the pristine state of the 5 upstream microservice charts published by AWS. Instead, engineered decoupled, environment-specific values-*.yaml override files to modify application behavior dynamically at runtime."
        - "Severing Cloud Dependencies: Systematically ripped out AWS DynamoDB, SQS, ElastiCache, and ALB Ingress to deploy the stack onto a bare-metal kubeadm cluster using local containerized alternatives (RabbitMQ, Redis, NodePort), proving complete platform portability."
    - title: "Deployment Orchestration"
      items:
        - "Helmfile Engineering: Eliminated the manual toil of executing 5 separate helm commands by engineering a declarative Helmfile orchestration layer."
        - "Dependency Sequencing: Authored 3 target-specific Helmfile configurations, utilizing the 'needs:' directive to ensure databases and message brokers provisioned strictly before microservices across all environments."
    - title: "Amazon EKS Infrastructure Engineering"
      items:
        - "Bypassing SCP Restrictions: Overcame strict lab Service Control Policies (SCPs) by pre-provisioning IAM roles via Terraform, deploying the control plane via eksctl, and engineering self-managed worker nodes via custom AWS CloudFormation templates to bypass IAM blocks on managed node groups."
        - "AWS Managed Services Integration: Offloaded application state back to AWS native services. Configured IAM Roles for Service Accounts (IRSA) to bind the Cart service to DynamoDB and the Orders service to a serverless event pipeline (SQS -> Lambda -> SNS)."
        - "Ingress Optimization: Deployed the AWS Load Balancer Controller and configured an Ingress Group to share a single ALB across the UI, Prometheus, and Grafana."
        - "Native AWS Logging: Deployed Fluent Bit to stream logs directly to CloudWatch Container Insights, abandoning standard ELK/Prometheus stacks to align strictly with AWS managed observability."
