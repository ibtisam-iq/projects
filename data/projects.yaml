- slug: devsecops-pipeline-engineering
  title: "Universal DevSecOps Pipeline Architecture featuring Jenkins for declarative CI; GitHub Actions for mirrored pipelines; SonarQube for quality gating; Trivy for multi-pass CVE scanning; and Nexus & GHCR for immutable multi-registry artifact publishing"
  category: platform
  status: completed
  year: 2026
  shortDescription: "Designed a universal 14-stage DevSecOps pipeline architecture. Mirrored the exact implementation across Jenkins and GitHub Actions, incorporating native SAST tooling (Bandit, pip-audit) and strict GitOps handoffs."
  description: "Architected a strict, language-agnostic DevSecOps platform across three independent monolithic codebases (Java, Python, Node.js). Before engineering the CI pipelines, I manually validated the complete application lifecycle from source compilation to local bare-metal database connections to establish a working baseline. I engineered a single, immutable 14-stage build-test-scan-publish pipeline and implemented it identically across both Jenkins and GitHub Actions. The pipelines enforce hard-fail security compliance, utilizing language-specific SAST tooling (Bandit, pip-audit, ESLint) and multi-pass Trivy scanning (explicitly isolating library dependencies from OS packages) to prevent CRITICAL CVEs from reaching production. All pipelines culminate in a strict GitOps handoff, dynamically injecting OCI artifact SHAs directly into the CD repository."
  sections:
    - title: "Pre-Pipeline Validation & Architecture"
      items:
        - "Local Bare-Metal Validation: Established a functional baseline prior to automation by manually validating application compilations (Maven, Webpack) and Native database attachments (MySQL/PostgreSQL) directly on bare-metal hardware."
        - "Pipeline Portability: Engineered a universal 14-stage pipeline and implemented it across both Jenkins and GitHub Actions, proving tool-agnostic CI/CD portability."
        - "Decoupled GitOps Handoff: Architected a strict CI/CD separation of concerns; CI pipelines communicate with CD deployment repositories solely via an automated Git commit (via strict shell interpolation of the image SHA), ensuring zero cluster access from CI."
    - title: "DevSecOps & Quality Gating"
      items:
        - "Language-Specific SAST: Engineered native security tooling per codebase, integrating Bandit and pip-audit for Python, npm audit and ESLint for Node.js, and OWASP/Trivy FS for Java to catch idiomatic vulnerabilities."
        - "The Trivy 3-Pass Strategy: Configured Trivy scanning to explicitly isolate '--vuln-type library' (blocking builds on CRITICALs) from '--vuln-type os' (advisory only), ensuring Debian maintainer CVEs do not falsely block application releases."
        - "Test Isolation: Engineered CI test suites to run completely isolated from live databases (e.g. using 'sqlite://' for Python) while still fulfilling strict JaCoCo and Cobertura XML coverage gates in SonarQube."
    - title: "Pipeline Optimization & Artifact Management"
      items:
        - "Multi-Registry Publishing: Automated simultaneous artifact publishing, pushing version-tagged Docker images to GHCR, Docker Hub, and a self-hosted Nexus registry."
        - "Immutable Versioning: Eradicated floating 'latest' tags by strictly versioning images via a combination of the semantic version, the exact 7-character Git SHA, and the CI build number."
